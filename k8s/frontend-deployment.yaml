apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shadowbroker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: frontend
          image: ghcr.io/bigbodycobain/shadowbroker-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # Resolves to the backend ClusterIP service within the cluster.
            - name: BACKEND_URL
              value: "http://backend.shadowbroker.svc.cluster.local:8000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
